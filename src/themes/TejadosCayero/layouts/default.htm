<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>{{ this.page.title }} - Reparaciones</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- FontAwesome para los iconos -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <!-- Tu CSS personalizado -->
        <link href="{{ 'assets/css/custom.css'|theme }}" rel="stylesheet">
        {% styles %}
    </head>
    <body>

        {% partial 'site/header' %}

        <main class="{{ this.page.id != 'index' ? 'page-content-offset' : '' }}">
            {% page %}
        </main>

        {% partial 'site/footer' %}

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
        window.onscroll = function() {
        const header = document.querySelector('.main-header');
        
        // Si el header NO tiene la clase 'static-page', ejecutamos el efecto de scroll
        if (header && !header.classList.contains('static-page')) {
            if (window.scrollY > 300) {
                header.classList.add('header-scrolled');
            } else {
                header.classList.remove('header-scrolled');
            }
        }
    };
</script>

        {% scripts %}
    </body>
</html>
