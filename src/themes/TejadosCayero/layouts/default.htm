<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>{{ this.page.title }} - Reparaciones</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- FontAwesome para los iconos -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <!-- Tu CSS personalizado -->
        <link href="{{ 'assets/css/custom.css'|theme }}" rel="stylesheet">

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
        {% styles %}
    </head>
    <body>

        {% partial 'site/header' %}

        <main class="{{ this.page.id != 'index' and this.page.id != 'contacto' ? 'page-content-offset' : '' }}">
            {% page %}
        </main>

        {% partial 'site/footer' %}

        <!-- Scripts -->
        
        <!-- 1. Cargar jQuery (Obligatorio para que funcione el $) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <!-- 2. Cargar el Framework AJAX de October  -->
        {% framework extras %}

        <!-- 3. Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
        
        <!-- 4. script de scroll  -->
        <script>
            window.onscroll = function() {
                const header = document.querySelector('.main-header');
                if (header && !header.classList.contains('static-page')) {
                    if (window.scrollY > 300) {
                        header.classList.add('header-scrolled');
                    } else {
                        header.classList.remove('header-scrolled');
                    }
                }
            };
        </script>
        
        <!-- 1. Cargar la estructura HTML primero -->
               {% partial 'chatbot' %}
    
        <!-- 2. Luego cargar los scripts que la manipulan -->
         <script src="{{ 'assets/js/chatbot.js'|theme }}"></script>

        {% scripts %}
    </body>
</html>
